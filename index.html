<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>To Do App</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-[#153677] to-[#4e085f] min-h-screen flex items-start justify-center pt-24">

<div class="w-full max-w-lg bg-white p-10 rounded-xl shadow-lg">

<h2 class="text-2xl font-bold text-[#002765] flex items-center mb-6">
To-Do List
<img src="images/icon.png" class="w-7 ml-2">
</h2>

<div class="flex items-center justify-between bg-gray-200 rounded-full pl-5 mb-6">

<input 
id="input-box"
type="text"
placeholder="Add your text"
class="flex-1 bg-transparent outline-none p-3 text-sm"
/>

<button 
onclick="addTask()"
class="bg-[#ff5945] text-white px-8 py-3 rounded-full hover:bg-red-500 transition">
Add
</button>

</div>

<ul id="list-container" class="space-y-2">

</ul>

</div>

<script src="script.js"></script>

</body>
</html>
